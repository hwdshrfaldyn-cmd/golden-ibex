<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الوعل الذهبي | Golden Ibex - التوفير العالمي</title>
    <style>
        :root { --gold: #D4AF37; --black: #050505; --card: #111; }
        body { background: var(--black); color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid var(--gold); background: #000; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-weight: bold; font-size: 22px; display: flex; align-items: center; gap: 10px; }
        .menu-btn { font-size: 30px; cursor: pointer; color: var(--gold); }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: #000; overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-left: 1px solid var(--gold); }
        .sidenav a { padding: 15px 30px; text-decoration: none; font-size: 20px; color: #818181; display: block; transition: 0.3s; }
        .sidenav a:hover { color: var(--gold); }
        .lang-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .lang-btn { background: none; border: 1px solid #444; color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); }
        .hero { text-align: center; padding: 60px 20px; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); }
        .hero h1 { font-size: 2.5rem; }
        .hero h1 span { color: var(--gold); }
        .badge { background: #28a745; color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: contain; background: #fff; border-radius: 10px; }
        .price { font-size: 22px; color: var(--gold); font-weight: bold; margin: 15px 0; }
        .btn { background: var(--gold); color: #000; text-decoration: none; padding: 12px; display: block; border-radius: 8px; font-weight: bold; }
        .suggest { margin-top: 50px; border: 1px dashed var(--gold); padding: 30px; border-radius: 20px; text-align: center; }
        [dir="ltr"] .sidenav { right: auto; left: 0; border-left: none; border-right: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" onclick="closeNav()" style="font-size: 36px;">&times;</a>
    <a href="#" onclick="closeNav()">الرئيسية / Home</a>
    <a href="#" onclick="closeNav()">من نحن / About Us</a>
    <a href="#" onclick="closeNav()">المدونة / Blog</a>
    <a href="#" onclick="closeNav()">الخصوصية / Privacy</a>
    <a href="#" onclick="closeNav()">اتصل بنا / Contact</a>
</div>

<header>
    <div class="logo">GOLDEN IBEX</div>
    <div class="menu-btn" onclick="openNav()">&#9776;</div>
</header>

<div class="lang-bar">
    <button class="lang-btn active" onclick="setL('ar')">العربية</button>
    <button class="lang-btn" onclick="setL('en')">English</button>
    <button class="lang-btn" onclick="setL('zh')">中文</button>
    <button class="lang-btn" onclick="setL('hi')">हिन्दी</button>
    <button class="lang-btn" onclick="setL('fr')">Français</button>
    <button class="lang-btn" onclick="setL('es')">Español</button>
</div>

<div class="hero">
    <div class="badge" id="b">توفير +12,000$ سنوياً</div>
    <h1 id="h">توقف عن دفع مبالغ زائدة..<br><span>ابدأ بالتوفير الذكي</span></h1>
    <p id="p">دليلك العالمي لأفضل البدائل الذكية بنصف السعر.</p>
</div>

<div class="container">
    <div class="grid" id="g"></div>
    <div class="suggest">
        <h3 id="sh">اقترح منتجاً بدقائق</h3>
        <input type="text" placeholder="Product Name..." style="padding:10px; width:70%; border-radius:5px; border:none;"><br><br>
        <button class="btn" style="width:150px; margin:auto; cursor:pointer;" onclick="alert('Done!')">إرسال</button>
    </div>
</div>

<script>
    const d = {
        ar: { h: "توقف عن دفع مبالغ زائدة..<br><span>ابدأ بالتوفير الذكي</span>", p: "دليلك العالمي لأفضل البدائل.", b: "توفير +12,000$ سنوياً", dir: "rtl" },
        en: { h: "Stop Overpaying..<br><span>Start Saving Smart</span>", p: "Your global guide to smart alternatives.", b: "Save +$12,000/Year", dir: "ltr" },
        zh: { h: "停止支付过高费用..<br><span>开始聪明省钱</span>", p: "全球智能替代品指南。", b: "每年节省 +$12,000", dir: "ltr" },
        hi: { h: "ज़्यादा भुगतान बंद करें..<br><span>स्मार्ट बचत शुरू करें</span>", p: "स्मार्ट विकल्पों के लिए वैश्विक मार्गदर्शक।", b: "+$12,000 सालाना बचाएं", dir: "ltr" },
        fr: { h: "Arrêtez de trop payer..<br><span>Épargnez malين</span>", p: "Guide mondial des alternatives.", b: "+12 000 $/an d'économie", dir: "ltr" },
        es: { h: "Deja de pagar de más..<br><span>Ahorra con inteligencia</span>", p: "Guía global de alternativas.", b: "Ahorra +$12,000 al año", dir: "ltr" }
    };
    const pr = [
        { n: "Premium Smartwatch Alt", pr: "$45", o: "$399", img: "https://m.media-amazon.com/images/I/71YvK4v7S4L._AC_SL1500_.jpg", id: "B09BKCDXZC" },
        { n: "Noise Cancelling Buds", pr: "$38", o: "$199", img: "https://m.media-amazon.com/images/I/61NfN96mXcL._AC_SL1500_.jpg", id: "B0C6V936BY" }
    ];
    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    function setL(l) {
        document.body.dir = d[l].dir;
        document.getElementById('h').innerHTML = d[l].h;
        document.getElementById('p').innerText = d[l].p;
        document.getElementById('b').innerText = d[l].b;
        const g = document.getElementById('g'); g.innerHTML = '';
        pr.forEach(p => {
            g.innerHTML += `<div class="card"><img src="${p.img}"><h3>${p.n}</h3><div class="price">${p.pr} <small style="text-decoration:line-through;color:#666">${p.o}</small></div><a href="https://www.amazon.com/dp/${p.id}?tag=hood2026-20" target="_blank" class="btn">Order Now</a></div>`;
        });
    }
    setL('ar');
</script>
</body>
</html>
